services:
  backend:
    build: ./backend
    restart: unless-stopped
    extra_hosts:
      # Allows the container to reach host services (Postgres, IBKR Gateway)
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABURSATIL_TOKEN=${DATABURSATIL_TOKEN}
      - IBKR_GATEWAY_URL=${IBKR_GATEWAY_URL}
      - IBKR_ACCOUNT_ID=${IBKR_ACCOUNT_ID}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:4200}
      - BITSO_API_KEY=${BITSO_API_KEY}
      - BITSO_API_SECRET=${BITSO_API_SECRET}
      - BITSO_API_HOSTNAME=${BITSO_API_HOSTNAME:-api.bitso.com}
      - JWT_SECRET=${JWT_SECRET}

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      # Loopback-only, distinct from the public 5001 port nginx exposes:
      # nginx terminates TLS on 5001 and reverse-proxies to this internal
      # port, since the iOS Capacitor shell requires HTTPS. Must not be
      # 5001 itself — nginx's public "listen 5001" would then collide
      # with this loopback bind on the same port number.
      - "127.0.0.1:15001:80"
    depends_on:
      - backend

  # Run with: docker compose --profile migrate run --rm migrate
  migrate:
    build:
      context: ./backend
      target: builder
    profiles: [migrate]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: node_modules/.bin/prisma migrate deploy
