name: Deploy — Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 60m
          script: |
            set -euo pipefail
            APP_DIR="/srv/stratton-oakmont"

            echo "── Pull latest code ─────────────────────────────────"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone git@github.com:erickgs2/stratton_oakmount.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "── Verify environment ───────────────────────────────"
            [ -f "$APP_DIR/.env" ] || {
              echo "ERROR: .env not found at $APP_DIR/.env"
              echo "Copy .env.example and fill in the values before deploying."
              exit 1
            }

            echo "── Build images ─────────────────────────────────────"
            docker compose build backend web migrate

            echo "── Run database migrations ──────────────────────────"
            docker compose --profile migrate run --rm migrate

            echo "── Start services ───────────────────────────────────"
            docker compose up -d --remove-orphans

            echo "── Prune stale images ───────────────────────────────"
            docker image prune -f

            echo "── Service status ───────────────────────────────────"
            docker compose ps
