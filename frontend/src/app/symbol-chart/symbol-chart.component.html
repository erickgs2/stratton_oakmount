<div class="chart-widget">
  <div class="chart-header">
    <span class="symbol-name">{{ symbol }}</span>
    <ng-container *ngIf="data">
      <span class="last-price">{{ data.lastPrice | number:'1.2-2' }}</span>
      <span class="change" [class]="changeClass">
        {{ changeSign }}{{ data.changePct | number:'1.2-2' }}%
      </span>
    </ng-container>
  </div>

  <div *ngIf="loading" class="chart-loading">
    <div class="shimmer"></div>
  </div>

  <div *ngIf="error && !loading" class="chart-error">No data</div>

  <svg *ngIf="!loading && !error && data" [attr.viewBox]="'0 0 ' + W + ' ' + H" preserveAspectRatio="none">
    <defs>
      <linearGradient [id]="symbol + '-grad'" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" [attr.stop-color]="data.changePct >= 0 ? '#4caf50' : '#f44336'" stop-opacity="0.25"/>
        <stop offset="100%" [attr.stop-color]="data.changePct >= 0 ? '#4caf50' : '#f44336'" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path class="area" [attr.d]="area" [attr.fill]="'url(#' + symbol + '-grad)'"/>
    <polyline class="line" [attr.points]="polyline"
      [attr.stroke]="data.changePct >= 0 ? '#4caf50' : '#f44336'"/>
  </svg>

  <div *ngIf="!loading && !error && data" class="chart-footer">
    <span class="range">{{ minPrice | number:'1.2-2' }} – {{ maxPrice | number:'1.2-2' }}</span>
    <span class="label">60d</span>
  </div>
</div>
