server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Next.js backend container
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Serve Angular SPA — fall back to index.html for deep links
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html references content-hashed bundle filenames, so it must
    # never be cached — otherwise clients (especially WKWebView, which
    # persists its HTTP cache to disk across app relaunches) can get stuck
    # serving stale bundle references indefinitely after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
